<!DOCTYPE html>
<html>
<head>
    <title>Simple User Creator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { background: #667eea; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn:disabled { opacity: 0.6; }
        .message { padding: 15px; border-radius: 5px; margin: 15px 0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .users-list { margin-top: 30px; }
        .user-item { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>👥 Simple User Creator</h1>
    <p>Create users directly without Cloud Functions</p>

    <div id="authStatus"></div>
    <div id="message"></div>

    <form id="createUserForm">
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="name" required placeholder="Enter full name">
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required placeholder="Enter email">
        </div>
        <div class="form-group">
            <label>Role:</label>
            <select id="role" required>
                <option value="">Select Role</option>
                <option value="admin">Admin</option>
                <option value="employee">Employee / Lead Intern</option>
                <option value="intern">Intern</option>
            </select>
        </div>
        <div class="form-group">
            <label>Domain:</label>
            <input type="text" id="domain" placeholder="AI, Web Dev, etc. (for interns)">
        </div>
        <button type="submit" class="btn" id="createBtn">Create User</button>
    </form>

    <div class="users-list">
        <h2>📋 Users</h2>
        <div id="usersList">Loading...</div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAFoXIPtkRJdTxcTcXQkDYDUxmzcoownWA",
            authDomain: "nextgen-innohub.firebaseapp.com",
            projectId: "nextgen-innohub",
            storageBucket: "nextgen-innohub.firebasestorage.app",
            messagingSenderId: "28087223200",
            appId: "1:28087223200:web:f4885a48ac45fdccfc1ac5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function generatePassword() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
            let password = '';
            for (let i = 0; i < 8; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return password;
        }

        async function loadUsers() {
            try {
                const usersSnapshot = await getDocs(collection(db, 'users'));
                const usersList = document.getElementById('usersList');
                
                if (usersSnapshot.empty) {
                    usersList.innerHTML = '<p>No users found</p>';
                    return;
                }

                let html = '';
                usersSnapshot.forEach(doc => {
                    const user = doc.data();
                    html += `
                        <div class="user-item">
                            <strong>${user.name}</strong> (${user.email})<br>
                            Role: ${user.role} | Domain: ${user.domain || 'N/A'}
                        </div>
                    `;
                });
                usersList.innerHTML = html;
            } catch (error) {
                document.getElementById('usersList').innerHTML = 'Error loading users: ' + error.message;
            }
        }

        onAuthStateChanged(auth, (user) => {
            const authStatus = document.getElementById('authStatus');
            if (user) {
                authStatus.innerHTML = `<div class="message success">✅ Logged in as: ${user.email}</div>`;
                loadUsers();
            } else {
                authStatus.innerHTML = `<div class="message error">❌ Not logged in. <a href="portal-login.html">Login here</a></div>`;
            }
        });

        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;
            const domain = document.getElementById('domain').value;
            const password = generatePassword();
            
            const messageDiv = document.getElementById('message');
            const createBtn = document.getElementById('createBtn');

            createBtn.disabled = true;
            createBtn.textContent = 'Creating...';

            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const newUser = userCredential.user;

                // Create user document in Firestore
                await setDoc(doc(db, 'users', newUser.uid), {
                    email: email,
                    name: name,
                    role: role,
                    domain: domain || null,
                    createdAt: new Date()
                });

                messageDiv.innerHTML = `
                    <div class="message success">
                        ✅ User created successfully!<br>
                        <strong>Email:</strong> ${email}<br>
                        <strong>Password:</strong> ${password}<br>
                        <strong>Role:</strong> ${role}
                    </div>
                `;

                document.getElementById('createUserForm').reset();
                loadUsers();

            } catch (error) {
                console.error('Error:', error);
                messageDiv.innerHTML = `<div class="message error">❌ Error: ${error.message}</div>`;
            } finally {
                createBtn.disabled = false;
                createBtn.textContent = 'Create User';
            }
        });
    </script>
</body>
</html>
