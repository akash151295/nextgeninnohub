<!DOCTYPE html>
<html>
<head>
    <title>Create Admin User</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { background: #667eea; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn:disabled { opacity: 0.6; }
        .message { padding: 15px; border-radius: 5px; margin: 15px 0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>🔧 Create Admin User</h1>
    <p>This will create your admin account in Firebase Authentication and Firestore.</p>

    <div id="message"></div>

    <form id="createAdminForm">
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" required placeholder="Minimum 6 characters">
        </div>
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="name" required placeholder="Your full name">
        </div>
        <button type="submit" class="btn" id="createBtn">Create Admin Account</button>
    </form>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAFoXIPtkRJdTxcTcXQkDYDUxmzcoownWA",
            authDomain: "nextgen-innohub.firebaseapp.com",
            projectId: "nextgen-innohub",
            storageBucket: "nextgen-innohub.firebasestorage.app",
            messagingSenderId: "28087223200",
            appId: "1:28087223200:web:f4885a48ac45fdccfc1ac5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('createAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const messageDiv = document.getElementById('message');
            const createBtn = document.getElementById('createBtn');

            createBtn.disabled = true;
            createBtn.textContent = 'Creating...';

            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Update profile
                await updateProfile(user, { displayName: name });

                // Create user document in Firestore
                await setDoc(doc(db, 'users', user.uid), {
                    email: email,
                    name: name,
                    role: 'admin',
                    domain: null,
                    createdAt: new Date()
                });

                messageDiv.innerHTML = `
                    <div class="message success">
                        ✅ Admin account created successfully!<br>
                        <strong>Email:</strong> ${email}<br>
                        <strong>Password:</strong> ${password}<br>
                        <br>
                        <a href="portal-login.html">Go to Login Page</a>
                    </div>
                `;

            } catch (error) {
                console.error('Error:', error);
                messageDiv.innerHTML = `<div class="message error">❌ Error: ${error.message}</div>`;
                createBtn.disabled = false;
                createBtn.textContent = 'Create Admin Account';
            }
        });
    </script>
</body>
</html>
