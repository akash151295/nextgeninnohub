<!DOCTYPE html>
<html>
<head>
    <title>Setup Admin</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 20px; border-radius: 10px; margin: 20px 0; }
        .loading { background: #fff3cd; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>🔧 Admin Setup</h1>
    <div id="status" class="status loading">Checking authentication...</div>
    <div id="debug"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAFoXIPtkRJdTxcTcXQkDYDUxmzcoownWA",
            authDomain: "nextgen-innohub.firebaseapp.com",
            projectId: "nextgen-innohub",
            storageBucket: "nextgen-innohub.firebasestorage.app",
            messagingSenderId: "28087223200",
            appId: "1:28087223200:web:f4885a48ac45fdccfc1ac5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                debugDiv.innerHTML = `<p>User found: ${user.email} (${user.uid})</p>`;
                try {
                    await setDoc(doc(db, 'users', user.uid), {
                        email: user.email,
                        name: user.displayName || 'Admin',
                        role: 'admin',
                        domain: null,
                        createdAt: new Date()
                    });
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = '✅ Admin setup complete! <br><a href="user-management.html">Go to User Management</a>';
                } catch (error) {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Error: ' + error.message;
                    debugDiv.innerHTML += `<p>Error: ${error}</p>`;
                }
            } else {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Not logged in. <br><a href="portal-login.html">Login first</a>';
            }
        });
    </script>
</body>
</html>
